name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.90.0
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --locked --target ${{ matrix.target }} -p depthdeck
      - name: Package
        shell: pwsh
        run: |
          $name = "depthdeck-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $name | Out-Null
          $extension = if ($IsWindows) { ".exe" } else { "" }
          Copy-Item "target/${{ matrix.target }}/release/depthdeck$extension" "$name/"
          Copy-Item README.md,LICENSE-MIT,LICENSE-APACHE "$name/"
          if ($IsWindows) {
            Compress-Archive -Path $name -DestinationPath "$name.zip"
          } else {
            tar -czf "$name.tar.gz" $name
          }
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: |
            depthdeck-*.zip
            depthdeck-*.tar.gz
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum depthdeck-* > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*

